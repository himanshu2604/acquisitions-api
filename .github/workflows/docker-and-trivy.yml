name: Docker Build, Scan & Push

on:
  workflow_run:
    workflows:
      - lint and format
      - tests
    types:
      - completed

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/kubernetes-demo-api

jobs:
  build-scan-push:
    name: Build, Scan & Push Docker Image
    runs-on: ubuntu-latest

    # ✅ Only run if previous workflows succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔹 Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # 🔹 Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔹 Extract metadata (tags, labels)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=prod-{{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}

      # 🔹 Build image locally (NO push yet)
      - name: Build Docker image (local)
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: acquisitions-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🔹 Cache Trivy DB (speed optimization)
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy

      # 🔥 Trivy Scan (FAIL if vulnerabilities found)
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'acquisitions-api:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'

      # 🧾 BONUS: Generate SBOM (CycloneDX)
      - name: Generate SBOM
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'acquisitions-api:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'sbom.json'

      # 📦 Upload SBOM as artifact
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.json

      # 🚀 Push image ONLY if scan passed
      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      # 📊 Summary
      - name: Build summary
        if: success()
        run: |
          echo "## DevSecOps Pipeline Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Lint & Tests passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Docker image built successfully" >> $GITHUB_STEP_SUMMARY
          echo "✅ Trivy scan passed (no HIGH/CRITICAL vulnerabilities)" >> $GITHUB_STEP_SUMMARY
          echo "✅ SBOM generated" >> $GITHUB_STEP_SUMMARY
          echo "✅ Image pushed to Docker Hub" >> $GITHUB_STEP_SUMMARY

      # ❌ Failure message
      - name: Failure notification
        if: failure()
        run: |
          echo "::error::Pipeline failed - check logs above"
          echo "::notice::Fix vulnerabilities or failing steps before re-running"

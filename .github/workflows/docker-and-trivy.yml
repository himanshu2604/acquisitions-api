name: Docker Build, Scan & Push

on:
  workflow_run:
    workflows: ['lint and format', 'tests']
    types: [completed]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/kubernetes-demo-api

jobs:
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          no-cache: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

  trivy-scan:
    name: Trivy Scan + SBOM
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      # Rebuild image (important)
      - name: Build image for scan
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          no-cache: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          vuln-type: os,library

      - name: Generate SBOM
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: cyclonedx
          output: sbom.json
          scan-type: image

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.json

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: trivy-scan

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Run tests
        run: |
          npm ci
          npm run test -- --coverage --passWithNoTests
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: test
          PORT: 3001

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: sonarqube

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  kubernetes-manifest:
    name: Update tag for Kubernetes
    runs-on: ubuntu-latest
    needs: docker-push

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: himanshu2604/acquisitions-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tag in deployment.yaml
        run: |
          cd gitops
          sed -i \
            "s|image: .*/acquisitions-api:.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            app/deployment.yaml
          git config user.email "ci-bot@github.com"
          git config user.name "GitHub Actions Bot"
          git add app/deployment.yaml
          git diff --staged --quiet || \
            git commit -m "ci: bump image to ${{ github.sha }}"
          git push

      - name: Summary
        if: success()
        run: |
          echo "## DevSecOps Pipeline 🚀" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build" >> $GITHUB_STEP_SUMMARY
          echo "✅ Trivy (CRITICAL=0)" >> $GITHUB_STEP_SUMMARY
          echo "✅ SonarQube" >> $GITHUB_STEP_SUMMARY
          echo "✅ SBOM" >> $GITHUB_STEP_SUMMARY
          echo "✅ Push successful" >> $GITHUB_STEP_SUMMARY
